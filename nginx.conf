server {
    listen 8000;

    # Proxy API traffic to FastAPI (internal port 8001)
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy MCP traffic to FastAPI — disable buffering for SSE streaming
    location /mcp {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header X-Accel-Buffering no;
    }

    # Serve React SPA — catch-all for client-side routing
    location / {
        root /Users/dat.ta/Projects/personal/gym-tracker-mcp/frontend/dist;
        try_files $uri $uri/ /index.html;
    }
}
