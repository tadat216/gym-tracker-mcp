# Run nginx without root privileges
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Log to user-writable directory
    access_log /tmp/nginx-access.log;
    error_log /tmp/nginx-error.log;
    
    server {
        listen 8000;

        # Proxy API traffic to FastAPI (internal port 8001)
        location /api/ {
            proxy_pass http://127.0.0.1:8001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Proxy MCP traffic to FastAPI — disable buffering for SSE streaming
        location /mcp {
            proxy_pass http://127.0.0.1:8001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header X-Accel-Buffering no;
        }

        # OAuth well-known discovery (RFC 8414) — must proxy to FastAPI, not SPA
        location /.well-known/ {
            proxy_pass http://127.0.0.1:8001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Serve React SPA — catch-all for client-side routing
        location / {
            root /home/dev/gym-tracker-mcp/frontend/dist;
            try_files $uri $uri/ /index.html;
        }
    }
}
